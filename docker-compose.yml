services:
  expense-tracker-app:
    build: .
    ports:
      - "8090:8090"
    depends_on:
      expense-tracker-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
   
  expense-tracker-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3308:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data: